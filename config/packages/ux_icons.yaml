ux_icons:
    # Configuration par défaut des icônes (taille, classe CSS, etc.)
    default_icon_attributes:
        fill: 'currentColor'
        focusable: 'false'
        aria-hidden: 'true'

    # Récupération à la volée depuis Iconify (Lucide, Tabler, Phosphor, etc.)
    # Les icônes sont téléchargées une fois puis mises en cache local automatiquement.
    iconify:
        enabled: true
        # En prod, on télécharge en build-time. En dev, à la volée.
        on_demand: '%kernel.debug%'
