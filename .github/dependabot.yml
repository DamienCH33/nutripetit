version: 2
updates:
  # Mises à jour PHP (Composer)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "composer"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Mises à jour GitHub Actions (les workflows eux-mêmes)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"

  # Mises à jour Docker (compose.yaml)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
